name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --name "GMP-Scheduler" main.py

      - name: Publish EXE to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-latest
          name: Windows EXE Latest
          body: |
            Windows executable build for GMP shift scheduler.
            Download GMP-Scheduler.exe and run it directly on Windows.
          files: dist/GMP-Scheduler.exe
          prerelease: true
          make_latest: true
          overwrite_files: true
