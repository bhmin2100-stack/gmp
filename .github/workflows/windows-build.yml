name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-company-build.txt

      - name: Stamp build metadata
        shell: pwsh
        run: |
          $version = python -c "import gmp_scheduler; print(gmp_scheduler.__version__)"
          $buildDate = (Get-Date).ToUniversalTime().ToString("o")
          "GMP_VERSION=$version" >> $env:GITHUB_ENV
          "GMP_BUILD_DATE=$buildDate" >> $env:GITHUB_ENV
          @"
          from __future__ import annotations

          APP_VERSION = "$version"
          BUILD_COMMIT = "${{ github.sha }}"
          BUILD_ID = "${{ github.run_id }}-${{ github.run_attempt }}"
          BUILD_DATE = "$buildDate"
          UPDATE_CHANNEL = "personal"
          "@ | Set-Content -Path gmp_scheduler\build_info.py -Encoding UTF8

      - name: Build EXE
        run: |
          python -m PyInstaller --noconsole --onefile --name "GMP-Scheduler" --icon "assets\gmp-scheduler.ico" --add-data "assets\gmp-scheduler.png;assets" main.py

      - name: Stamp company build metadata
        shell: pwsh
        run: |
          @"
          from __future__ import annotations

          APP_VERSION = "$env:GMP_VERSION"
          BUILD_COMMIT = "${{ github.sha }}"
          BUILD_ID = "company-${{ github.run_id }}-${{ github.run_attempt }}"
          BUILD_DATE = "$env:GMP_BUILD_DATE"
          UPDATE_CHANNEL = "company"
          "@ | Set-Content -Path gmp_scheduler\build_info.py -Encoding UTF8

      - name: Build company EXE
        run: |
          python -m PyInstaller --noconsole --onefile --name "GMP-Scheduler-company" --icon "assets\gmp-scheduler.ico" --add-data "assets\gmp-scheduler.png;assets" --workpath build-company-actions --specpath build-company-actions main.py

      - name: Write release metadata
        shell: pwsh
        run: |
          $exe = "dist\GMP-Scheduler.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $exe).Length
          $metadata = [ordered]@{
            version = $env:GMP_VERSION
            build_id = "${{ github.run_id }}-${{ github.run_attempt }}"
            commit = "${{ github.sha }}"
            build_date = $env:GMP_BUILD_DATE
            exe_asset = "GMP-Scheduler.exe"
            sha256 = $hash
            size = $size
          }
          $metadata | ConvertTo-Json | Set-Content -Path "dist\version.json" -Encoding UTF8

          $companyExe = "dist\GMP-Scheduler-company.exe"
          $companyMetadata = [ordered]@{
            version = $env:GMP_VERSION
            commit = "${{ github.sha }}"
            build_date = $env:GMP_BUILD_DATE
            asset = "GMP-Scheduler-company.exe"
            update_channel = "company"
            pyinstaller = "6.8.0"
            sha256 = (Get-FileHash $companyExe -Algorithm SHA256).Hash.ToLower()
            size = (Get-Item $companyExe).Length
          }
          $companyMetadata | ConvertTo-Json | Set-Content -Path "dist\company-build.json" -Encoding UTF8

      - name: Publish EXE to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-latest
          name: Windows EXE Latest
          body: |
            Windows executable build for GMP shift scheduler.
            Download GMP-Scheduler.exe and run it directly on Windows.
          files: |
            dist/GMP-Scheduler.exe
            dist/version.json
            dist/GMP-Scheduler-company.exe
            dist/company-build.json
          prerelease: true
          make_latest: true
          overwrite_files: true
